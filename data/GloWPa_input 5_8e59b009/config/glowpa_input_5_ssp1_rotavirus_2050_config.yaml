logger:
  enabled: TRUE
  threshold: INFO
  file: output/glowpa_input_5_ssp1_rotavirus_2050/glowpa.log
  appender: TEE
input:
  isoraster: input/glowpa_input_5_ssp1_rotavirus_2050/human_emissions/isoraster.tif
  isodata: input/glowpa_input_5_ssp1_rotavirus_2050/human_emissions/isodata.RDS
  wwtp: input/glowpa_input_5_ssp1_rotavirus_2050/human_emissions/treatment.RDS
  population:
    urban: input/glowpa_input_5_ssp1_rotavirus_2050/human_emissions/popurban.tif
    rural: input/glowpa_input_5_ssp1_rotavirus_2050/human_emissions/poprural.tif
wwtp:
  treatment: POINT
population:
  correct: TRUE
pathogen: rotavirus
output:
  dir: output/glowpa_input_5_ssp1_rotavirus_2050
  sources:
    human:
      land: human_sources_land_rotavirus_glowpa_input_5_ssp1_rotavirus_2050.csv
      surface_water: human_sources_water_rotavirus_glowpa_input_5_ssp1_rotavirus_2050.csv
  sinks:
    surface_water:
      table: surface_water_emissions_rotavirus_glowpa_input_5_ssp1_rotavirus_2050.csv
      grid: surface_water_emissions_rotavirus_glowpa_input_5_ssp1_rotavirus_2050.tif
    land:
      table: land_emissions_rotavirus_glowpa_input_5_ssp1_rotavirus_2050.csv
      grid: land_emissions_rotavirus_glowpa_input_5_ssp1_rotavirus_2050.tif
constants:
  runoff_fraction: 0.025
  threshold_discharge: 1
